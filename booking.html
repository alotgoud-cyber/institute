<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Course - Language Institute</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">logo</a>
      <nav class="nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About us</a></li>
          <li><a href="courses.html">Language courses</a></li>
        </ul>
      </nav>
      <div>
        <a href="login.html" class="btn-login">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Login
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="booking-page">
      <div class="container">
        <div class="booking-card">
          <h2>Course Registration</h2>
          <p class="auth-subtitle">Please fill in your details to book this course</p>

          <div id="booking-alert"></div>

          <div class="course-summary" id="course-summary">
            <!-- Populated by JavaScript -->
          </div>

          <form id="bookingForm" onsubmit="return handleBooking(event)">
            <div class="form-group">
              <label for="fullName">Full Name *</label>
              <input type="text" id="fullName" name="fullName" class="form-control" required minlength="2">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" class="form-control" required>
              </div>
              <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" class="form-control" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="nationality">Nationality</label>
                <input type="text" id="nationality" name="nationality" class="form-control">
              </div>
              <div class="form-group">
                <label for="startDate">Preferred Start Date</label>
                <input type="date" id="startDate" name="startDate" class="form-control">
              </div>
            </div>

            <div class="form-group">
              <label for="paymentMethod">Payment Method *</label>
              <select id="paymentMethod" name="paymentMethod" class="form-control" required>
                <option value="">-- Select Payment Method --</option>
                <option value="credit_card">Credit Card</option>
                <option value="bank_transfer">Bank Transfer</option>
                <option value="cash">Cash on Site</option>
              </select>
            </div>

            <div class="form-group">
              <label for="notes">Additional Notes</label>
              <textarea id="notes" name="notes" class="form-control" rows="3" placeholder="Any special requirements?"></textarea>
            </div>

            <button type="submit" class="btn-submit">Confirm Registration</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div class="footer-wave"></div>
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-logo">logo</div>
        <div class="footer-links">
          <h4>LINKS</h4>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="courses.html">Language courses</a></li>
            <li><a href="login.html">Login</a></li>
          </ul>
        </div>
        <div class="footer-contact">
          <h4>Contact information</h4>
          <div class="contact-item">
            <div class="contact-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg></div>
            <div><div class="contact-text-label">Phone</div><div class="contact-text-value">1234566777</div></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
            <div><div class="contact-text-label">Email</div><div class="contact-text-value">email@gmail.com</div></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
            <div><div class="contact-text-label">Location</div><div class="contact-text-value">Your Address here</div></div>
          </div>
        </div>
      </div>
      <div class="copyright">COPY RIGHT 2026</div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    // ----- Get course from URL parameter -----
    const params = new URLSearchParams(window.location.search);
    const courseId = parseInt(params.get('courseId')) || 1;
    const course = COURSES.find(c => c.id === courseId) || COURSES[0];

    // ----- Display course summary -----
    document.getElementById('course-summary').innerHTML = `
      <div class="course-summary-row">
        <span><strong>Course:</strong></span>
        <span>${course.name}</span>
      </div>
      <div class="course-summary-row">
        <span><strong>Duration:</strong></span>
        <span>${course.duration}</span>
      </div>
      <div class="course-summary-row">
        <span><strong>Total Price:</strong></span>
        <span>$${course.price}</span>
      </div>
    `;

    // ----- Handle booking submission -----
    function handleBooking(event) {
      event.preventDefault();
      const alertBox = document.getElementById('booking-alert');

      // Build booking object
      const booking = {
        id: Date.now(),
        courseId: course.id,
        courseName: course.name,
        courseDuration: course.duration,
        price: course.price,
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        nationality: document.getElementById('nationality').value,
        startDate: document.getElementById('startDate').value,
        paymentMethod: document.getElementById('paymentMethod').value,
        notes: document.getElementById('notes').value,
        bookedAt: new Date().toISOString()
      };

      // Save booking to localStorage
      let bookings = JSON.parse(localStorage.getItem('institute_bookings') || '[]');
      bookings.push(booking);
      localStorage.setItem('institute_bookings', JSON.stringify(bookings));

      // Show success
      alertBox.innerHTML = '<div class="alert alert-success">Your registration is confirmed! Thank you. Redirecting to home...</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      document.getElementById('bookingForm').reset();

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);

      return false;
    }
  </script>
</body>
</html>
